 <!DOCTYPE html>
<html>
<head>
  <title>VibeZ - Anonymous to Friends</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; margin: 0; background: #0f0f0f; color: white; }
    #login, #app { max-width: 450px; margin: 20px auto; padding: 15px; }
    h2 { text-align: center; color: #a855f7; margin: 10px 0; }
    input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #1f1f1f; color: white; font-size: 16px; }
    button { padding: 12px 16px; margin: 4px 0; border-radius: 12px; border: none; background: #7c3aed; color: white; font-weight: bold; font-size: 15px; cursor: pointer; width: 100%; }
    button:active { background: #6d28d9; }
   .smallBtn { padding: 8px 12px; font-size: 13px; width: auto; margin: 0 4px; }
   .greenBtn { background: #16a34a; }
   .redBtn { background: #dc2626; }
   .greyBtn { background: #4b5563; }
   .backBtn { background: #4b5563; width: auto; margin-bottom: 10px; }
    #tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    #tabs button { flex: 1; font-size: 13px; position: relative; }
   .activeTab { background: #a855f7!important; }
   .notifDot { position: absolute; top: 4px; right: 8px; background: #dc2626; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; }
    #messages, #userList, #requestList, #friendsList { height: 42vh; overflow-y: scroll; border: 1px solid #333; border-radius: 12px; padding: 10px; margin-bottom: 10px; background: #181818; }
   .msg,.userRow { margin: 8px 0; padding: 10px; background: #262626; border-radius: 10px; word-wrap: break-word; }
   .msg b { color: #a855f7; }
   .msg .anon { color: #f59e0b; }
   .msg .system { text-align: center; color: #16a34a; font-size: 13px; background: #1f2937; }
   .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
   .userRow { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
   .userRow:hover { background: #333; }
   .profilePic { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; margin-right: 10px; cursor: pointer; }
   .userInfo { display: flex; align-items: center; }
   .onlineDot { width: 8px; height: 8px; background: #16a34a; border-radius: 50%; margin-left: 5px; }
   .offlineDot { width: 8px; height: 8px; background: #6b7280; border-radius: 50%; margin-left: 5px; }
   .lastSeen { font-size: 11px; color: #6b7280; }
   .streak { color: #f97316; font-weight: bold; margin-left: 5px; }
    #logoutBtn { background: #dc2626; }
   .hidden { display: none; }
   .searchBox { display: flex; gap: 8px; margin-bottom: 10px; }
   .searchBox input { margin: 0; }
   .searchBox button { width: auto; margin: 0; }
   .chatHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
   .msgCount { font-size: 12px; color: #9ca3af; }
   .progressBar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 10px; }
   .progressFill { height: 100%; background: #a855f7; border-radius: 3px; transition: 0.3s; }
   .settingRow { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; padding: 10px; background: #262626; border-radius: 10px; }
   .toggle { width: 50px; height: 25px; background: #4b5563; border-radius: 25px; position: relative; cursor: pointer; }
   .toggle.on { background: #16a34a; }
   .toggleBall { width: 21px; height: 21px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
   .toggle.on .toggleBall { left: 27px; }
   .inputRow { display: flex; gap: 8px; }
   .inputRow input { margin: 0; }
   .inputRow button { width: auto; margin: 0; padding: 14px; }
   .emojiBtn { font-size: 20px; background: #262626; }
   /* NEW: DP Modal WhatsApp Style */
   .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 999; }
   .modalContent { text-align: center; }
   .modalContent img { max-width: 90%; max-height: 70vh; border-radius: 12px; }
   .modalBtns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
   .modalBtns button { width: auto; }
  </style>
</head>

  <div id="login">
    <h2>VibeZ Login 💜</h2>
    <input id="username" type="text" placeholder="Choose Username: @iqra123">
    <input id="email" type="email" placeholder="Enter Email">
    <input id="pass" type="password" placeholder="Enter Password">
    <button onclick="signup()">Create New Account</button>
    <button onclick="login()">Login</button>
