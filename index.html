 <!DOCTYPE html>
<html>
<head>
  <title>VibeZ - Real Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; margin: 0; background: #0f0f0f; color: white; }
    #login, #chat { max-width: 400px; margin: 40px auto; padding: 20px; }
    h2 { text-align: center; color: #a855f7; }
    input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #1f1f1f; color: white; font-size: 16px; }
    button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; background: #7c3aed; color: white; font-weight: bold; font-size: 16px; }
    button:active { background: #6d28d9; }
    #messages { height: 60vh; overflow-y: scroll; border: 1px solid #333; border-radius: 12px; padding: 10px; margin-bottom: 10px; background: #181818; }
   .msg { margin: 8px 0; padding: 10px; background: #262626; border-radius: 10px; word-wrap: break-word; }
   .msg b { color: #a855f7; }
    #logoutBtn { background: #dc2626; }
  </style>
</head>
<body>

  <div id="login">
    <h2>VibeZ Login 💜</h2>
    <input id="email" type="email" placeholder="Email daalo">
    <input id="pass" type="password" placeholder="Password daalo">
    <button onclick="signup()">Naya Account Banao</button>
    <button onclick="login()">Login Karo</button>
    <p id="error" style="color:#f87171; text-align:center;"></p>
  </div>

  <div id="chat" style="display:none">
    <h2>VibeZ Chat 🚀</h2>
    <div id="messages"></div>
    <input id="msgInput" placeholder="Message likho...">
    <button onclick="sendMsg()">Send</button>
    <button id="logoutBtn" onclick="logout()">Logout</button>
  </div>

<script type="module">
  // Firebase imports - sab kuch ready hai
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // TERI FIREBASE CONFIG - MAIN NE DAAL DI ✅
  const firebaseConfig = {
    apiKey: "AIzaSyCOk009zNd4BMtS0ySPedwhNTwNMCc-CyI",
    authDomain: "vibez-6ed71.firebaseapp.com",
    projectId: "vibez-6ed71",
    storageBucket: "vibez-6ed71.firebasestorage.app",
    messagingSenderId: "524036069373",
    appId: "1:524036069373:web:db9006783b42f1b5852b94",
    measurementId: "G-SHVC4TZVYL"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const errorBox = document.getElementById('error');

  // Signup function
  window.signup = () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    errorBox.innerText = '';
    createUserWithEmailAndPassword(auth, email, pass)
     .catch((e) => errorBox.innerText = e.message);
  }

  // Login function
  window.login = () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    errorBox.innerText = '';
    signInWithEmailAndPassword(auth, email, pass)
     .catch((e) => errorBox.innerText = e.message);
  }

  // Logout function
  window.logout = () => signOut(auth);

  // Check karo user login hai ya nahi
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('chat').style.display = 'block';
      loadMsgs();
    } else {
      document.getElementById('login').style.display = 'block';
      document.getElementById('chat').style.display = 'none';
    }
  });

  // Message bhejo
  window.sendMsg = async () => {
    const text = document.getElementById('msgInput').value;
    const user = auth.currentUser;
    if (text.trim() && user) {
      await addDoc(collection(db, "messages"), {
        text: text,
        email: user.email,
        time: serverTimestamp()
      });
      document.getElementById('msgInput').value = '';
    }
  }

  // Message load karo real-time
  function loadMsgs() {
    const q = query(collection(db, "messages"), orderBy("time"));
    onSnapshot(q, (snapshot) => {
      let html = '';
      snapshot.forEach((doc) => {
        const msg = doc.data();
        const name = msg.email.split('@')[0];
        html += `<div class="msg"><b>${name}:</b> ${msg.text}</div>`;
      });
      const msgDiv = document.getElementById('messages');
      msgDiv.innerHTML = html;
      msgDiv.scrollTop = msgDiv.scrollHeight;
    });
  }
</script>

</body>
</html>
