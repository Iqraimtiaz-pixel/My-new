<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#000"/>
  <title>VibeZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;background:#000;color:#fff;font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased}
    body{overflow:hidden}
    input,textarea,button{font-family:'Sora',sans-serif;font-size:inherit}
    button{cursor:pointer;border:none;outline:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222;border-radius:4px}
    input:-webkit-autofill{-webkit-box-shadow:0 0 0 100px #111 inset!important;-webkit-text-fill-color:#fff!important}

    /* ── LAYOUT ── */
    .screen{height:100vh;height:100dvh;display:flex;flex-direction:column;background:#000;overflow:hidden}

    /* ── AUTH ── */
    .auth-bg{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:#000;background-image:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(124,58,237,.3) 0%,transparent 65%);overflow-y:auto}
    .auth-box{width:100%;max-width:400px}
    .logo{text-align:center;margin-bottom:32px}
    .logo-text{font-size:52px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#7C3AED,#A78BFA,#C4B5FD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .logo-sub{color:#374151;font-size:13px;margin-top:6px}
    .card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:22px;padding:26px 22px;box-shadow:0 0 80px rgba(124,58,237,.1)}
    .tabs{display:flex;background:#111;border-radius:12px;padding:3px;margin-bottom:22px;gap:3px}
    .tab{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;background:transparent;color:#444;transition:all .2s}
    .tab.on{background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,.4)}
    .lbl{display:block;color:#555;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
    .inp{width:100%;padding:12px 14px;border-radius:11px;background:#111;border:1.5px solid #1f1f1f;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
    .inp:focus{border-color:#7C3AED;box-shadow:0 0 0 3px rgba(124,58,237,.12)}
    .inp::placeholder{color:#333}
    .pw-wrap{position:relative}
    .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#444;font-size:15px;padding:4px}
    .err-box{margin-top:10px;padding:10px 12px;border-radius:9px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#F87171;font-size:13px;text-align:center}
    .ok-box{margin-top:10px;padding:10px 12px;border-radius:9px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ADE80;font-size:13px;text-align:center}
    .big-btn{width:100%;margin-top:16px;padding:14px;border-radius:13px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#7C3AED,#6D28D9);box-shadow:0 4px 24px rgba(124,58,237,.45);transition:all .2s}
    .big-btn:active{transform:scale(.98)}
    .big-btn:disabled{background:#1a1a1a;color:#444;box-shadow:none}
    .switch-row{text-align:center;margin-top:14px;color:#333;font-size:13px}
    .switch-lnk{color:#A78BFA;font-weight:600;cursor:pointer}
    .str-bars{display:flex;gap:3px;margin-top:6px}
    .str-bar{height:3px;flex:1;border-radius:2px;transition:background .3s}

    /* ── HEADER ── */
    .hdr{background:#000;border-bottom:1px solid #111;flex-shrink:0;background-image:linear-gradient(180deg,rgba(124,58,237,.1),transparent)}
    .hdr-top{display:flex;justify-content:space-between;align-items:center;padding:13px 16px 10px}
    .wm{font-size:24px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .srch-wrap{padding:0 14px 10px;position:relative}
    .srch-ico{position:absolute;left:25px;top:50%;transform:translateY(-52%);font-size:13px;color:#333;pointer-events:none}
    .srch{width:100%;padding:9px 12px 9px 34px;border-radius:20px;background:#0f0f0f;border:1px solid #1a1a1a;color:#fff;font-size:13px;outline:none}
    .srch:focus{border-color:#7C3AED}
    .srch::placeholder{color:#2a2a2a}
    .nav{display:flex;border-top:1px solid #0f0f0f}
    .nav-t{flex:1;padding:9px 4px 10px;background:transparent;color:#333;font-size:11px;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
    .nav-t.on{color:#A78BFA;font-weight:700;border-bottom-color:#7C3AED}
    .badge{background:#EF4444;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}

    /* ── USER ROWS ── */
    .urow{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid #080808}
    .uinfo{flex:1;min-width:0}
    .uname{color:#fff;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .usub{color:#3a3a3a;font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── SNAPCHAT STYLE ADD BUTTONS ── */
    .add-btn{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#7C3AED,#6D28D9);border:none;white-space:nowrap;flex-shrink:0;min-width:60px;text-align:center;box-shadow:0 2px 10px rgba(124,58,237,.4);touch-action:manipulation}
    .add-btn:active{transform:scale(.94);opacity:.85}
    .sent-badge{padding:6px 11px;border-radius:20px;font-size:11px;font-weight:600;color:#6B7280;background:#111;border:1px solid #1f1f1f;white-space:nowrap;flex-shrink:0}
    .friend-badge{padding:6px 11px;border-radius:20px;font-size:11px;font-weight:600;color:#A78BFA;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);white-space:nowrap;flex-shrink:0}
    .chat-btn{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#7C3AED,#6D28D9);border:none;white-space:nowrap;flex-shrink:0;box-shadow:0 2px 10px rgba(124,58,237,.4);touch-action:manipulation}
    .chat-btn:active{transform:scale(.94)}
    .acc-btn{padding:7px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;background:#22C55E;border:none;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
    .acc-btn:active{transform:scale(.94)}
    .ign-btn{padding:7px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#EF4444;background:#1a1a1a;border:1px solid #2a2a2a;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
    .ign-btn:active{transform:scale(.94)}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:60px 20px;color:#2a2a2a}
    .empty-i{font-size:40px;margin-bottom:10px}
    .empty-t{font-size:14px;color:#333;margin-bottom:4px}
    .empty-s{font-size:12px;color:#222}

    /* ── FOOTER ── */
    .foot{padding:10px 16px;border-top:1px solid #111;display:flex;align-items:center;justify-content:space-between;background:#050505;flex-shrink:0}
    .sec-lbl{padding:11px 16px 4px;color:#555;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}

    /* ── CHAT ── */
    .chat-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#050505;border-bottom:1px solid #111;flex-shrink:0;background-image:linear-gradient(180deg,rgba(124,58,237,.07),transparent)}
    .back-btn{background:none;color:#7C3AED;font-size:22px;padding:3px 8px 3px 0;line-height:1;flex-shrink:0}
    .msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column}
    .d-sep{text-align:center;margin:8px 0}
    .d-sep span{color:#333;font-size:10px;background:#0a0a0a;padding:3px 10px;border-radius:8px}
    .mrow{display:flex;align-items:flex-end;gap:6px;margin-bottom:4px}
    .mrow.me{flex-direction:row-reverse}
    .msender{color:#A78BFA;font-size:10px;margin-bottom:3px;margin-left:2px}
    .mbub{padding:9px 13px;font-size:14px;line-height:1.5;word-break:break-word;max-width:75%}
    .mbub.me{background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;border-radius:18px 18px 4px 18px;box-shadow:0 2px 12px rgba(124,58,237,.3)}
    .mbub.them{background:#1a1a1a;color:#fff;border-radius:18px 18px 18px 4px}
    .mtime{color:#222;font-size:10px;margin-top:2px}
    .mtime.me{text-align:right}.mtime.them{text-align:left}
    .epick{background:#0a0a0a;border-top:1px solid #111;padding:10px 12px;display:flex;flex-wrap:wrap;gap:4px;max-height:148px;overflow-y:auto;flex-shrink:0}
    .ebtn{background:none;border:none;font-size:22px;padding:3px;border-radius:6px;line-height:1;touch-action:manipulation}
    .ebtn:active{background:#1a1a1a}
    .ibar{display:flex;align-items:flex-end;gap:7px;padding:8px 12px 10px;background:#050505;border-top:1px solid #111;flex-shrink:0}
    .icircle{border:1px solid #1a1a1a;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;touch-action:manipulation;background:#111}
    .icircle:active{background:#1f1f1f}
    .txa{flex:1;background:#111;border:1.5px solid #1a1a1a;border-radius:22px;padding:9px 14px;color:#fff;font-size:14px;resize:none;outline:none;line-height:1.5;max-height:108px;overflow-y:auto}
    .txa:focus{border-color:#7C3AED}
    .txa::placeholder{color:#2a2a2a}
    .sbtn{border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
    .sbtn.on{background:linear-gradient(135deg,#7C3AED,#6D28D9);box-shadow:0 2px 12px rgba(124,58,237,.5)}
    .sbtn.off{background:#111;border:1px solid #1a1a1a}

    /* ── MODAL ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:9999;padding:0 16px}
    .mcard{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:20px;padding:24px 20px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(124,58,237,.2)}
    .mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .xbtn{background:#141414;border:1px solid #222;color:#666;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
    .tgl-track{width:42px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
    .tgl-thumb{position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .25s}
    .prv-row{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid #0f0f0f}

    /* ── VANISH CONFIRM ── */
    .vnsh-modal{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:22px;padding:28px 20px;max-width:300px;width:100%;text-align:center}

    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fi{animation:fadeIn .25s ease forwards}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .pulse{animation:pulse 1.2s ease infinite}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ═══════════════════════════════════════════════════════════
   DATABASE
═══════════════════════════════════════════════════════════ */
if(!window.__vz){
  window.__vz={users:[],messages:[],requests:[],online:{},privacy:{}};
}
const DB=window.__vz;

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const now=()=>Date.now();
const cid=(a,b)=>[a,b].sort().join('::');
const tf=t=>new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const df=t=>{
  const d=new Date(t),td=new Date();
  if(d.toDateString()===td.toDateString()) return 'Today';
  const y=new Date();y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
};
const ac=n=>{
  const c=['#7C3AED','#6D28D9','#5B21B6','#8B5CF6','#A78BFA','#9333EA'];
  let h=0;for(const x of(n||'?'))h=x.charCodeAt(0)+((h<<5)-h);
  return c[Math.abs(h)%c.length];
};
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const pws=p=>{if(!p)return 0;let s=0;if(p.length>=6)s++;if(p.length>=10)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;return Math.min(s,4)};
const SL=['','Weak','Fair','Good','Strong'];
const SC=['#333','#EF4444','#F59E0B','#3B82F6','#22C55E'];
const EMOJIS=['😀','😂','😍','🥰','😎','🤔','😢','😡','👍','👎','❤️','🔥','✨','🎉','💯','🙏','👀','💪','😭','🤣','😊','😏','🥺','😴','🤗','💀','👋','🎊','🌟','💫','⚡','🎯','🌈','💎','🚀','🍕','🎮','🏆','💰','🌸'];

/* ═══════════════════════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════════════════════ */
const Auth={
  signup(name,email,pass){
    const e=email.trim().toLowerCase();
    if(!name.trim()) return{err:'Name required'};
    if(!e) return{err:'Email required'};
    if(pass.length<6) return{err:'Password min 6 characters'};
    if(DB.users.find(u=>u.email===e)) return{err:'Email already registered'};
    const user={id:uid(),name:name.trim(),email:e,pass,photo:null,bio:'',createdAt:now()};
    DB.users.push(user);
    DB.online[user.id]=now();
    DB.privacy[user.id]={online:true,photo:true,bio:true,seen:true};
    return{user};
  },
  login(email,pass){
    const e=email.trim().toLowerCase();
    if(!e) return{err:'Enter email'};
    if(!pass) return{err:'Enter password'};
    const user=DB.users.find(u=>u.email===e&&u.pass===pass);
    if(!user) return{err:'Wrong email or password'};
    DB.online[user.id]=now();
    return{user};
  },
  ping(id){DB.online[id]=now()},
  isOnline(id){const l=DB.online[id];return!!l&&now()-l<30000},
  lastSeen(id){
    const l=DB.online[id];if(!l)return'never';
    const d=now()-l;
    if(d<60000)return'just now';
    if(d<3600000)return Math.floor(d/60000)+'m ago';
    if(d<86400000)return Math.floor(d/3600000)+'h ago';
    return df(l);
  },
  priv(id){return DB.privacy[id]||{online:true,photo:true,bio:true,seen:true}},
  setPriv(id,p){DB.privacy[id]={...DB.privacy[id],...p}},
  updateProfile(id,fields){
    const i=DB.users.findIndex(u=>u.id===id);
    if(i!==-1){DB.users[i]={...DB.users[i],...fields};return DB.users[i]}
    return null;
  },
};

const Msg={
  send(from,to,text){
    const m={id:uid(),text,from,to,cid:cid(from,to),at:now(),gone:false};
    DB.messages.push(m);return m;
  },
  get(a,b){
    const id=cid(a,b);
    return DB.messages.filter(m=>m.cid===id&&!m.gone).sort((x,y)=>x.at-y.at).slice(-50);
  },
  vanish(a,b){const id=cid(a,b);DB.messages.forEach(m=>{if(m.cid===id)m.gone=true})},
  last(a,b){
    const id=cid(a,b);
    return DB.messages.filter(m=>m.cid===id&&!m.gone).sort((x,y)=>y.at-x.at)[0]||null;
  },
};

/* ── SNAPCHAT STYLE FRIEND SYSTEM ── */
const Fr={
  /* Send request — only if no existing relation */
  add(from,to){
    if(DB.requests.find(r=>(r.from===from&&r.to===to)||(r.from===to&&r.to===from)))return;
    DB.requests.push({id:uid(),from,to,st:'pending',at:now()});
  },
  /* Accept incoming request */
  accept(rid){const r=DB.requests.find(r=>r.id===rid);if(r)r.st='accepted'},
  /* Ignore/delete request */
  ignore(rid){const r=DB.requests.find(r=>r.id===rid);if(r)r.st='ignored'},
  /* Get relation between two users */
  rel(a,b){return DB.requests.find(r=>(r.from===a&&r.to===b)||(r.from===b&&r.to===a))||null},
  /* Are they friends? */
  areFriends(a,b){return Fr.rel(a,b)?.st==='accepted'},
  /* Incoming pending requests for user */
  incoming(id){return DB.requests.filter(r=>r.to===id&&r.st==='pending')},
  /* Sent pending requests by user */
  sent(id){return DB.requests.filter(r=>r.from===id&&r.st==='pending')},
  /* All accepted friends */
  friends(id){return DB.users.filter(u=>u.id!==id&&Fr.areFriends(id,u.id))},
};

/* ═══════════════════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════════════════ */

/* ── Avatar ── */
function Av({user,size=40,online=false}){
  const p=Auth.priv(user?.id);
  const on=online&&p.online&&Auth.isOnline(user?.id);
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      {user?.photo&&p.photo
        ?<img src={user.photo} alt="" style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',border:'2px solid #7C3AED'}}/>
        :<div style={{width:size,height:size,borderRadius:'50%',background:`linear-gradient(135deg,${ac(user?.name)},${ac((user?.name||'')+'z')})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.35,fontWeight:700,color:'#fff',border:'2px solid #7C3AED'}}>{ini(user?.name)}</div>
      }
      {online&&<div style={{position:'absolute',bottom:1,right:1,width:size*.27,height:size*.27,borderRadius:'50%',background:on?'#22C55E':'#2d2d2d',border:'2px solid #000',transition:'background .3s'}}/>}
    </div>
  );
}

/* ── Profile Modal ── */
function ProfileModal({user,onClose,onSave}){
  const [name,setName]=useState(user.name);
  const [bio,setBio]=useState(user.bio||'');
  const [photo,setPhoto]=useState(user.photo||null);
  const [priv,setPriv]=useState(Auth.priv(user.id));
  const fr=useRef();
  const save=()=>{
    const u=Auth.updateProfile(user.id,{name:name.trim()||user.name,bio,photo});
    Auth.setPriv(user.id,priv);
    onSave(u||{...user,name,bio,photo});onClose();
  };
  return(
    <div className="overlay">
      <div className="mcard fi">
        <div className="mhdr">
          <span style={{color:'#fff',fontWeight:700,fontSize:16}}>Edit Profile</span>
          <button className="xbtn" onClick={onClose}>✕</button>
        </div>
        {/* Photo */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:18}}>
          <div style={{position:'relative',cursor:'pointer'}} onClick={()=>fr.current.click()}>
            {photo
              ?<img src={photo} alt="" style={{width:76,height:76,borderRadius:'50%',objectFit:'cover',border:'3px solid #7C3AED'}}/>
              :<div style={{width:76,height:76,borderRadius:'50%',background:`linear-gradient(135deg,${ac(name)},#4C1D95)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,color:'#fff',border:'3px solid #7C3AED'}}>{ini(name)}</div>
            }
            <div style={{position:'absolute',bottom:2,right:2,background:'#7C3AED',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,border:'2px solid #000'}}>📷</div>
          </div>
          <input ref={fr} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f)}}/>
          <span style={{color:'#444',fontSize:11,marginTop:5}}>Tap to change photo</span>
        </div>
        <div style={{marginBottom:12}}><label className="lbl">Name</label><input value={name} onChange={e=>setName(e.target.value)} className="inp" placeholder="Your name"/></div>
        <div style={{marginBottom:18}}><label className="lbl">Bio</label><textarea value={bio} onChange={e=>setBio(e.target.value)} rows={2} placeholder="Something about you..." style={{width:'100%',padding:'10px 12px',borderRadius:10,background:'#111',border:'1.5px solid #1f1f1f',color:'#fff',fontSize:13,outline:'none',resize:'none',lineHeight:1.5,boxSizing:'border-box'}}/></div>
        <div style={{marginBottom:20}}>
          <label className="lbl">Privacy</label>
          {[['online','Show online status'],['seen','Show last seen'],['photo','Show photo'],['bio','Show bio']].map(([k,l])=>(
            <div key={k} className="prv-row">
              <span style={{color:'#aaa',fontSize:13}}>{l}</span>
              <div className="tgl-track" style={{background:priv[k]?'#7C3AED':'#1f1f1f'}} onClick={()=>setPriv(p=>({...p,[k]:!p[k]}))}>
                <div className="tgl-thumb" style={{left:priv[k]?21:2}}/>
              </div>
            </div>
          ))}
        </div>
        <button onClick={save} className="big-btn">Save Changes</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════════════ */
function AuthScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [showP,setShowP]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [busy,setBusy]=useState(false);
  const s=pws(pass);

  const sw=m=>{setMode(m);setErr('');setOk('');setName('');setEmail('');setPass('');setShowP(false)};

  const go=()=>{
    setErr('');setOk('');
    if(mode==='signup'&&!name.trim()){setErr('Enter your name');return}
    if(!email.trim()){setErr('Enter your email');return}
    if(!pass){setErr('Enter your password');return}
    setBusy(true);
    setTimeout(()=>{
      if(mode==='signup'){
        const r=Auth.signup(name,email,pass);
        if(r.err){setErr(r.err);setBusy(false);return}
        /* ✅ AUTO LOGIN — no need to login again ever */
        setOk('Account created! Taking you in…');
        setTimeout(()=>onLogin(r.user),900);
      } else {
        const r=Auth.login(email,pass);
        setBusy(false);
        if(r.err){setErr(r.err);return}
        onLogin(r.user);
      }
    },280);
  };

  const onK=e=>{if(e.key==='Enter')go()};

  return(
    <div className="auth-bg">
      <div className="auth-box fi">
        <div className="logo">
          <div className="logo-text">VibeZ</div>
          <div className="logo-sub">Private chats. Your vibe. 🔒</div>
        </div>
        <div className="card">
          {/* Tabs */}
          <div className="tabs">
            {[['login','Sign In'],['signup','Sign Up']].map(([id,l])=>(
              <button key={id} className={`tab ${mode===id?'on':''}`} onClick={()=>sw(id)}>{l}</button>
            ))}
          </div>

          {/* Fields */}
          {mode==='signup'&&(
            <div style={{marginBottom:12}}>
              <label className="lbl">Full Name</label>
              <input type="text" value={name} onChange={e=>setName(e.target.value)} onKeyDown={onK} placeholder="Your name" autoComplete="name" className="inp"/>
            </div>
          )}
          <div style={{marginBottom:12}}>
            <label className="lbl">Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={onK} placeholder="you@email.com" autoComplete="email" className="inp"/>
          </div>
          <div style={{marginBottom:4}}>
            <label className="lbl">Password</label>
            <div className="pw-wrap">
              <input type={showP?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={onK}
                placeholder={mode==='signup'?'Min 6 chars':'••••••••'}
                autoComplete={mode==='signup'?'new-password':'current-password'}
                className="inp" style={{paddingRight:40}}/>
              <button className="pw-eye" onClick={()=>setShowP(x=>!x)}>{showP?'🙈':'👁️'}</button>
            </div>
            {mode==='signup'&&pass&&(
              <div style={{marginTop:6}}>
                <div className="str-bars">
                  {[1,2,3,4].map(i=><div key={i} className="str-bar" style={{background:i<=s?SC[s]:'#1a1a1a'}}/>)}
                </div>
                <div style={{color:SC[s],fontSize:10,marginTop:3}}>{SL[s]}</div>
              </div>
            )}
          </div>

          {err&&<div className="err-box">⚠️ {err}</div>}
          {ok&&<div className="ok-box">✅ {ok}</div>}

          <button onClick={go} disabled={busy||!!ok} className="big-btn" style={{opacity:(busy||ok)?.7:1}}>
            {ok?<span className="pulse">Entering VibeZ…</span>
              :busy?<span className="pulse">{mode==='login'?'Signing in…':'Creating account…'}</span>
              :mode==='login'?'Sign In →':'Create Account →'}
          </button>

          <div className="switch-row">
            {mode==='login'?'New? ':'Have account? '}
            <span className="switch-lnk" onClick={()=>sw(mode==='login'?'signup':'login')}>
              {mode==='login'?'Sign Up':'Sign In'}
            </span>
          </div>

          {mode==='signup'&&(
            <div style={{marginTop:14,padding:'10px 12px',background:'rgba(124,58,237,.06)',border:'1px solid rgba(124,58,237,.15)',borderRadius:10}}>
              <div style={{color:'#7C3AED',fontSize:11,fontWeight:700,marginBottom:4}}>After signing up:</div>
              <div style={{color:'#444',fontSize:11,lineHeight:1.6}}>
                You're logged in automatically.<br/>
                Go to <b style={{color:'#A78BFA'}}>People</b> tab → tap <b style={{color:'#A78BFA'}}>Add Friend</b> → they accept → then chat!
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   USERS LIST — SNAPCHAT STYLE
═══════════════════════════════════════════════════════════ */
function ListScreen({me:initMe,onChat,onLogout}){
  const [me,setMe]=useState(initMe);
  const [tab,setTab]=useState('people');
  const [q,setQ]=useState('');
  const [showProf,setShowProf]=useState(false);
  const [tick,setTick]=useState(0);
  const tick_=()=>setTick(t=>t+1);

  useEffect(()=>{
    Auth.ping(me.id);
    const iv=setInterval(()=>{Auth.ping(me.id);tick_()},4000);
    return()=>clearInterval(iv);
  },[me.id]);

  const sq=q.toLowerCase();
  const others=DB.users.filter(u=>u.id!==me.id&&(u.name.toLowerCase().includes(sq)||u.email.toLowerCase().includes(sq)));
  const myFriends=Fr.friends(me.id);
  const inc=Fr.incoming(me.id);
  const snt=Fr.sent(me.id);

  const tabs=[
    ['people','People'],
    ['friends',`Friends${myFriends.length?` (${myFriends.length})`:''}` ],
    ['requests',`Requests${inc.length?` +${inc.length}`:''}` ],
  ];

  /* ── Snapchat-style action button ── */
  const ActionBtn=({user})=>{
    const r=Fr.rel(me.id,user.id);

    if(!r){
      /* No relation — show Add Friend */
      return(
        <button className="add-btn" onTouchStart={()=>{}} onClick={e=>{
          e.stopPropagation();
          Fr.add(me.id,user.id);
          tick_();
        }}>
          Add Friend
        </button>
      );
    }

    if(r.st==='pending'&&r.from===me.id){
      /* I sent the request */
      return <span className="sent-badge">Pending…</span>;
    }

    if(r.st==='pending'&&r.to===me.id){
      /* They sent me a request — Accept or Ignore */
      return(
        <div style={{display:'flex',gap:5,flexShrink:0}}>
          <button className="acc-btn" onTouchStart={()=>{}} onClick={e=>{e.stopPropagation();Fr.accept(r.id);tick_()}}>Accept</button>
          <button className="ign-btn" onTouchStart={()=>{}} onClick={e=>{e.stopPropagation();Fr.ignore(r.id);tick_()}}>Ignore</button>
        </div>
      );
    }

    if(r.st==='accepted'){
      /* Already friends */
      return(
        <button className="chat-btn" onTouchStart={()=>{}} onClick={e=>{e.stopPropagation();onChat(user)}}>
          Chat
        </button>
      );
    }

    /* Ignored — allow re-adding */
    if(r.st==='ignored'&&r.to===me.id){
      return(
        <button className="add-btn" onTouchStart={()=>{}} onClick={e=>{
          e.stopPropagation();
          r.st='pending';r.from=me.id;r.to=user.id;r.at=now();
          tick_();
        }}>Add Friend</button>
      );
    }

    return null;
  };

  const URow=({user,showAction})=>{
    const p=Auth.priv(user.id);
    const on=p.online&&Auth.isOnline(user.id);
    const last=Msg.last(me.id,user.id);
    const isFr=Fr.areFriends(me.id,user.id);
    return(
      <div className="urow" style={{cursor:isFr?'pointer':'default'}} onClick={isFr?()=>onChat(user):undefined}>
        <Av user={user} size={46} online/>
        <div className="uinfo">
          <div className="uname">{user.name}</div>
          <div className="usub">
            {isFr&&last?(last.from===me.id?`You: ${last.text}`:last.text)
              :on?'🟢 Online'
              :p.seen?`Last seen ${Auth.lastSeen(user.id)}`
              :user.email}
          </div>
        </div>
        {showAction&&(
          <div style={{flexShrink:0,marginLeft:6}} onClick={e=>e.stopPropagation()}>
            <ActionBtn user={user}/>
          </div>
        )}
      </div>
    );
  };

  return(
    <div className="screen">
      {/* Header */}
      <div className="hdr">
        <div className="hdr-top">
          <div className="wm">VibeZ</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {inc.length>0&&<div className="badge">{inc.length}</div>}
            <div style={{cursor:'pointer'}} onClick={()=>setShowProf(true)}>
              <Av user={me} size={34} online/>
            </div>
          </div>
        </div>
        <div className="srch-wrap">
          <span className="srch-ico">🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search people…" className="srch"/>
        </div>
        <div className="nav">
          {tabs.map(([id,l])=>(
            <button key={id} className={`nav-t ${tab===id?'on':''}`} onClick={()=>setTab(id)}>{l}</button>
          ))}
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,overflowY:'auto'}}>

        {/* ── PEOPLE TAB ── */}
        {tab==='people'&&(
          <>
            {others.length===0
              ?<div className="empty"><div className="empty-i">👥</div><div className="empty-t">{q?'No users found':'No other users yet'}</div><div className="empty-s">Share the app with friends</div></div>
              :<>
                <div className="sec-lbl">TAP "ADD FRIEND" TO CONNECT</div>
                {others.map(u=><URow key={u.id} user={u} showAction={true}/>)}
              </>
            }
          </>
        )}

        {/* ── FRIENDS TAB ── */}
        {tab==='friends'&&(
          myFriends.length===0
            ?<div className="empty"><div className="empty-i">🤝</div><div className="empty-t">No friends yet</div><div className="empty-s">Go to People → tap Add Friend</div></div>
            :myFriends.map(u=><URow key={u.id} user={u} showAction={false}/>)
        )}

        {/* ── REQUESTS TAB ── */}
        {tab==='requests'&&(
          <>
            {inc.length===0&&snt.length===0&&(
              <div className="empty"><div className="empty-i">📨</div><div className="empty-t">No requests yet</div><div className="empty-s">People tab → Add Friend to send a request</div></div>
            )}
            {inc.length>0&&(
              <>
                <div className="sec-lbl">INCOMING ({inc.length})</div>
                {inc.map(r=>{
                  const f=DB.users.find(u=>u.id===r.from);
                  return f&&(
                    <div key={r.id} className="urow">
                      <Av user={f} size={44}/>
                      <div className="uinfo">
                        <div className="uname">{f.name}</div>
                        <div className="usub">{f.email}</div>
                      </div>
                      <div style={{display:'flex',gap:6,flexShrink:0}}>
                        <button className="acc-btn" onTouchStart={()=>{}} onClick={()=>{Fr.accept(r.id);tick_()}}>Accept</button>
                        <button className="ign-btn" onTouchStart={()=>{}} onClick={()=>{Fr.ignore(r.id);tick_()}}>Ignore</button>
                      </div>
                    </div>
                  );
                })}
              </>
            )}
            {snt.length>0&&(
              <>
                <div className="sec-lbl">SENT ({snt.length})</div>
                {snt.map(r=>{
                  const t=DB.users.find(u=>u.id===r.to);
                  return t&&(
                    <div key={r.id} className="urow">
                      <Av user={t} size={44}/>
                      <div className="uinfo">
                        <div className="uname">{t.name}</div>
                        <div className="usub" style={{color:'#F59E0B'}}>⏳ Waiting for response</div>
                      </div>
                    </div>
                  );
                })}
              </>
            )}
          </>
        )}
      </div>

      {/* Footer */}
      <div className="foot">
        <div>
          <div style={{color:'#fff',fontSize:13,fontWeight:600}}>{me.name}</div>
          <div style={{color:'#22C55E',fontSize:10,marginTop:1}}>● Online</div>
        </div>
        <button onClick={onLogout} style={{background:'#111',border:'1px solid #1a1a1a',color:'#555',padding:'6px 14px',borderRadius:9,fontSize:12}}>Sign Out</button>
      </div>

      {showProf&&<ProfileModal user={me} onClose={()=>setShowProf(false)} onSave={u=>setMe(u)}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   CHAT SCREEN
═══════════════════════════════════════════════════════════ */
function ChatScreen({me,other:init,onBack}){
  const [msgs,setMsgs]=useState([]);
  const [txt,setTxt]=useState('');
  const [emoji,setEmoji]=useState(false);
  const [vanish,setVanish]=useState(false);
  const [vanished,setVanished]=useState(false);
  const [other,setOther]=useState(init);
  const inpRef=useRef();
  const btmRef=useRef();

  const load=useCallback(()=>{
    const f=DB.users.find(u=>u.id===other.id);
    if(f)setOther(f);
    setMsgs(Msg.get(me.id,other.id));
  },[me.id,other.id]);

  useEffect(()=>{
    load();Auth.ping(me.id);
    const iv=setInterval(()=>{load();Auth.ping(me.id)},3000);
    return()=>clearInterval(iv);
  },[load,me.id]);

  useEffect(()=>{btmRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=()=>{
    const t=txt.trim();if(!t)return;
    Msg.send(me.id,other.id,t);
    setTxt('');setEmoji(false);
    inpRef.current?.blur();
    load();
  };

  const doVanish=()=>{
    Msg.vanish(me.id,other.id);
    setVanish(false);
    setVanished(true);
    load();
    /* Show "vanished" message for 2s then close */
    setTimeout(()=>setVanished(false),2500);
  };

  const priv=Auth.priv(other.id);
  const on=priv.online&&Auth.isOnline(other.id);
  const grouped=[];let ld=null;
  msgs.forEach(m=>{
    const d=df(m.at);if(d!==ld){grouped.push({d:true,l:d,k:'d'+d});ld=d}
    grouped.push({m,k:m.id});
  });
  const freshMe=DB.users.find(u=>u.id===me.id)||me;

  return(
    <div className="screen">
      {/* Header */}
      <div className="chat-hdr">
        <button className="back-btn" onClick={onBack}>←</button>
        <Av user={other} size={40} online/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:'#fff',fontWeight:700,fontSize:15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{other.name}</div>
          <div style={{fontSize:11,color:on?'#22C55E':'#555',marginTop:1}}>{on?'● Online now':priv.seen?`Last seen ${Auth.lastSeen(other.id)}`:''}</div>
        </div>
        {/* Vanish button — clearly labeled */}
        <button
          onTouchStart={()=>{}}
          onClick={()=>setVanish(true)}
          style={{background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:20,padding:'7px 12px',display:'flex',alignItems:'center',gap:5,color:'#ccc',fontSize:12,fontWeight:600,flexShrink:0,touchAction:'manipulation'}}>
          <span style={{fontSize:15}}>👻</span> Vanish
        </button>
      </div>

      {/* Messages */}
      <div className="msgs">
        {msgs.length===0&&!vanished&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#1f1f1f'}}>
            <div style={{fontSize:48,marginBottom:10}}>💬</div>
            <div style={{fontSize:14,color:'#2a2a2a',fontWeight:600}}>Start chatting</div>
            <div style={{fontSize:12,color:'#1f1f1f',marginTop:4}}>Say hi to {other.name}!</div>
          </div>
        )}
        {vanished&&(
          <div style={{textAlign:'center',padding:'20px',color:'#7C3AED',fontSize:13}}>
            <div style={{fontSize:32,marginBottom:6}}>👻</div>
            Chat vanished!
          </div>
        )}
        {grouped.map(item=>{
          if(item.d)return<div key={item.k} className="d-sep"><span>{item.l}</span></div>;
          const{m}=item;const mine=m.from===me.id;const u=mine?freshMe:other;
          return(
            <div key={item.k} className={`mrow ${mine?'me':''}`}>
              {!mine&&<Av user={u} size={26}/>}
              <div style={{maxWidth:'75%'}}>
                {!mine&&<div className="msender">{u.name}</div>}
                <div className={`mbub ${mine?'me':'them'}`}>{m.text}</div>
                <div className={`mtime ${mine?'me':'them'}`}>{tf(m.at)}</div>
              </div>
            </div>
          );
        })}
        <div ref={btmRef}/>
      </div>

      {/* Emoji picker */}
      {emoji&&(
        <div className="epick">
          {EMOJIS.map(e=><button key={e} className="ebtn" onClick={()=>{setTxt(t=>t+e);inpRef.current?.focus()}}>{e}</button>)}
        </div>
      )}

      {/* Input bar */}
      <div className="ibar">
        <button className="icircle" style={{background:emoji?'#7C3AED':'#111'}} onClick={()=>setEmoji(e=>!e)}>😊</button>
        <textarea ref={inpRef} value={txt} onChange={e=>setTxt(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}
          placeholder="Message…" rows={1} className="txa"
          onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,108)+'px'}}/>
        <button onClick={send} disabled={!txt.trim()} className={`sbtn ${txt.trim()?'on':'off'}`}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>

      {/* ── VANISH CONFIRM MODAL ── */}
      {vanish&&(
        <div className="overlay" onClick={()=>setVanish(false)}>
          <div className="vnsh-modal fi" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:44,marginBottom:10}}>👻</div>
            <div style={{color:'#fff',fontWeight:700,fontSize:17,marginBottom:8}}>Vanish Chat?</div>
            <div style={{color:'#555',fontSize:13,lineHeight:1.7,marginBottom:22}}>
              All messages with <b style={{color:'#A78BFA'}}>{other.name}</b> will be deleted forever for both of you.
            </div>
            <button
              onTouchStart={()=>{}}
              onClick={doVanish}
              style={{width:'100%',padding:'13px',borderRadius:12,background:'#EF4444',color:'#fff',fontWeight:700,fontSize:15,marginBottom:10,touchAction:'manipulation'}}>
              🔥 Yes, Vanish
            </button>
            <button
              onTouchStart={()=>{}}
              onClick={()=>setVanish(false)}
              style={{width:'100%',padding:'12px',borderRadius:12,background:'transparent',border:'1px solid #2a2a2a',color:'#666',fontSize:14,touchAction:'manipulation'}}>
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT
═══════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [chat,setChat]=useState(null);
  if(!user)return<AuthScreen onLogin={u=>{setUser(u);setChat(null)}}/>;
  if(chat)return<ChatScreen me={user} other={chat} onBack={()=>setChat(null)}/>;
  return<ListScreen me={user} onChat={setChat} onLogout={()=>{setUser(null);setChat(null)}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
