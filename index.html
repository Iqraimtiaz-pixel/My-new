 <!DOCTYPE html>
<html>
<head>
  <title>VibeZ - Anonymous to Friends</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; margin: 0; background: #0f0f0f; color: white; }
    #login, #app { max-width: 450px; margin: 20px auto; padding: 15px; }
    h2 { text-align: center; color: #a855f7; margin: 10px 0; }
    input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #1f1f1f; color: white; font-size: 16px; }
    button { padding: 12px 16px; margin: 4px 0; border-radius: 12px; border: none; background: #7c3aed; color: white; font-weight: bold; font-size: 15px; cursor: pointer; width: 100%; }
    button:active { background: #6d28d9; }
   .smallBtn { padding: 8px 12px; font-size: 13px; width: auto; margin: 0 4px; }
   .greenBtn { background: #16a34a; }
   .redBtn { background: #dc2626; }
   .greyBtn { background: #4b5563; }
   .backBtn { background: #4b5563; width: auto; margin-bottom: 10px; }
    #tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    #tabs button { flex: 1; font-size: 13px; position: relative; }
   .activeTab { background: #a855f7!important; }
   .notifDot { position: absolute; top: 4px; right: 8px; background: #dc2626; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; }
    #messages, #userList, #requestList, #friendsList { height: 42vh; overflow-y: scroll; border: 1px solid #333; border-radius: 12px; padding: 10px; margin-bottom: 10px; background: #181818; }
   .msg,.userRow { margin: 8px 0; padding: 10px; background: #262626; border-radius: 10px; word-wrap: break-word; }
   .msg b { color: #a855f7; }
   .msg .anon { color: #f59e0b; }
   .msg .system { text-align: center; color: #16a34a; font-size: 13px; background: #1f2937; }
   .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
   .userRow { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
   .userRow:hover { background: #333; }
   .profilePic { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; margin-right: 10px; }
   .userInfo { display: flex; align-items: center; }
   .onlineDot { width: 8px; height: 8px; background: #16a34a; border-radius: 50%; margin-left: 5px; }
   .offlineDot { width: 8px; height: 8px; background: #6b7280; border-radius: 50%; margin-left: 5px; }
   .lastSeen { font-size: 11px; color: #6b7280; }
   .streak { color: #f97316; font-weight: bold; margin-left: 5px; }
    #logoutBtn { background: #dc2626; }
   .hidden { display: none; }
   .searchBox { display: flex; gap: 8px; margin-bottom: 10px; }
   .searchBox input { margin: 0; }
   .searchBox button { width: auto; margin: 0; }
   .chatHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
   .msgCount { font-size: 12px; color: #9ca3af; }
   .progressBar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 10px; }
   .progressFill { height: 100%; background: #a855f7; border-radius: 3px; transition: 0.3s; }
   .settingRow { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; padding: 10px; background: #262626; border-radius: 10px; }
   .toggle { width: 50px; height: 25px; background: #4b5563; border-radius: 25px; position: relative; cursor: pointer; }
   .toggle.on { background: #16a34a; }
   .toggleBall { width: 21px; height: 21px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
   .toggle.on .toggleBall { left: 27px; }
   .inputRow { display: flex; gap: 8px; }
   .inputRow input { margin: 0; }
   .inputRow button { width: auto; margin: 0; padding: 14px; }
   .emojiBtn { font-size: 20px; background: #262626; }
  </style>
</head>
<body>

  <div id="login">
    <h2>VibeZ Login 💜</h2>
    <input id="username" type="text" placeholder="Choose Username: @iqra123">
    <input id="email" type="email" placeholder="Enter Email">
    <input id="pass" type="password" placeholder="Enter Password">
    <button onclick="signup()">Create New Account</button>
    <button onclick="login()">Login</button>
    <p id="error" style="color:#f87171; text-align:center;"></p>
  </div>

  <div id="app" class="hidden">
    <h2>VibeZ 🚀</h2>
    <p style="text-align:center; color:#9ca3af; margin:0 0 10px 0;">@<span id="myUsername"></span></p>

    <div id="tabs">
      <button id="friendsTab" onclick="showTab('friends')" class="activeTab">Friends</button>
      <button id="peopleTab" onclick="showTab('people')">Add</button>
      <button id="reqTab" onclick="showTab('requests')">Requests <span id="reqNotif" class="notifDot hidden"></span></button>
      <button id="profileTab" onclick="showTab('profile')">Profile</button>
    </div>

    <!-- FRIENDS TAB -->
    <div id="friendsDiv">
      <div id="friendsList"></div>
    </div>

    <!-- PEOPLE TAB -->
    <div id="peopleDiv" class="hidden">
      <div class="searchBox">
        <input id="searchUser" placeholder="Search by @username or email">
        <button onclick="searchUser()">Search</button>
      </div>
      <div id="userList"><p style="text-align:center;color:#6b7280">Search user to add friend</p></div>
    </div>

    <!-- REQUESTS TAB -->
    <div id="requestsDiv" class="hidden">
      <div id="requestList"></div>
    </div>

    <!-- PROFILE TAB -->
    <div id="profileDiv" class="hidden">
      <div style="text-align:center;margin-bottom:15px;">
        <img id="myProfilePic" class="profilePic" style="width:80px;height:80px;" src="https://i.imgur.com/6VBx3io.png">
      </div>
      <div class="settingRow">
        <span>Display Name</span>
        <input id="displayName" style="width: 60%; margin: 0; padding: 8px;" placeholder="Your name">
      </div>
      <div class="settingRow">
        <span>Profile Pic URL</span>
        <input id="picUrl" style="width: 60%; margin: 0; padding: 8px;" placeholder="Imgur link paste karo">
      </div>
      <div class="settingRow">
        <span>Show Online Status</span>
        <div id="onlineToggle" class="toggle on" onclick="toggleOnline()"><div class="toggleBall"></div></div>
      </div>
      <div class="settingRow">
        <span>Show Last Seen</span>
        <div id="lastSeenToggle" class="toggle on" onclick="toggleLastSeen()"><div class="toggleBall"></div></div>
      </div>
      <button onclick="saveProfile()">Save Profile</button>
    </div>

    <!-- PRIVATE CHAT -->
    <div id="chatDiv" class="hidden">
      <button class="backBtn" onclick="closeChat()">← Back</button>
      <div class="chatHeader">
        <div class="userInfo">
          <img id="chatPic" class="profilePic" src="https://i.imgur.com/6VBx3io.png">
          <div>
            <h3 id="chatWith" style="margin:0;"></h3>
            <div id="chatStatus" class="lastSeen"></div>
          </div>
        </div>
        <span class="msgCount" id="msgCount"></span>
      </div>
      <div class="progressBar"><div id="progressFill" class="progressFill" style="width:0%"></div></div>
      <div id="messages"></div>
      <div class="inputRow">
        <button class="emojiBtn" onclick="addEmoji()">😊</button>
        <input id="msgInput" placeholder="Type or paste Imgur link for pic...">
        <button onclick="sendMsg()">Send</button>
      </div>
    </div>

    <button id="logoutBtn" onclick="logout()">Logout</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove, where, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCOk009zNd4BMtS0ySPedwhNTwNMCc-CyI",
    authDomain: "vibez-6ed71.firebaseapp.com",
    projectId: "vibez-6ed71",
    storageBucket: "vibez-6ed71.firebasestorage.app",
    messagingSenderId: "524036069373",
    appId: "1:524036069373:web:db9006783b42f1b5852b94",
    measurementId: "G-SHVC4TZVYL"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const errorBox = document.getElementById('error');
  let currentUser = null;
  let currentUserData = null;
  let currentChatId = null;
  let currentChatUnsub = null;
  let currentChatPartner = null;

  const emojis = ['😂','😭','💜','🔥','👑','😍','🥰','😎','🫂','✨','🚀','✅','😭','🤣','😊','🙄','😘'];
  
  window.addEmoji = () => {
    const e = emojis[Math.floor(Math.random() * emojis.length)];
    document.getElementById('msgInput').value += e;
  }

  window.signup = async () => {
    const username = document.getElementById('username').value.trim().toLowerCase().replace('@', '');
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    errorBox.innerText = '';
    if (!username) { errorBox.innerText = 'Username required'; return; }
    if (username.length < 3) { errorBox.innerText = 'Username min 3 letters'; return; }
    const q = query(collection(db, "users"), where("username", "==", username));
    const snap = await getDocs(q);
    if (!snap.empty) { errorBox.innerText = 'Username already taken'; return; }
    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, "users", userCred.user.uid), {
        email: email,
        username: username,
        displayName: username,
        picUrl: 'https://i.imgur.com/6VBx3io.png',
        uid: userCred.user.uid,
        friends: [],
        requests: [],
        online: true,
        showOnline: true,
        showLastSeen: true,
        lastSeen: serverTimestamp()
      });
    } catch (e) { errorBox.innerText = e.message; }
  }

  window.login = () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    errorBox.innerText = '';
    signInWithEmailAndPassword(auth, email, pass).catch((e) => errorBox.innerText = e.message);
  }

  window.logout = async () => {
    if (currentUser) {
      await updateDoc(doc(db, "users", currentUser.uid), { online: false, lastSeen: serverTimestamp() });
    }
    signOut(auth);
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await updateDoc(doc(db, "users", user.uid), { online: true });
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        currentUserData = userDoc.data();
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('myUsername').innerText = currentUserData.username;
        document.getElementById('displayName').value = currentUserData.displayName || currentUserData.username;
        document.getElementById('picUrl').value = currentUserData.picUrl || '';
        document.getElementById('myProfilePic').src = currentUserData.picUrl || 'https://i.imgur.com/6VBx3io.png';
        if (!currentUserData.showOnline) document.getElementById('onlineToggle').classList.remove('on');
        if (!currentUserData.showLastSeen) document.getElementById('lastSeenToggle').classList.remove('on');
        loadFriends();
        loadRequests();
      }
    } else {
      if (currentUser) await updateDoc(doc(db, "users", currentUser.uid), { online: false, lastSeen: serverTimestamp() });
      currentUser = null;
      if (currentChatUnsub) currentChatUnsub();
      document.getElementById('login').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
    }
  });

  window.showTab = (tab) => {
    closeChat();
    document.getElementById('friendsDiv').classList.add('hidden');
    document.getElementById('peopleDiv').classList.add('hidden');
    document.getElementById('requestsDiv').classList.add('hidden');
    document.getElementById('profileDiv').classList.add('hidden');
    document.getElementById('friendsTab').classList.remove('activeTab');
    document.getElementById('peopleTab').classList.remove('activeTab');
    document.getElementById('reqTab').classList.remove('activeTab');
    document.getElementById('profileTab').classList.remove('activeTab');
    document.getElementById(tab + 'Div').classList.remove('hidden');
    document.getElementById(tab + 'Tab').classList.add('activeTab');
  }

  function getChatId(uid1, uid2) {
    return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
  }

  function formatLastSeen(ts) {
    if (!ts) return '';
    const diff = (Date.now() - ts.toDate().getTime()) / 1000;
    if (diff < 60) return 'online';
    if (diff < 3600) return `last seen ${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `last seen ${Math.floor(diff/3600)}h ago`;
    return `last seen ${Math.floor(diff/86400)}d ago`;
  }

  function isToday(ts) {
    if (!ts) return false;
    const date = ts.toDate();
    const today = new Date();
    return date.getDate() === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
  }

  function isYesterday(ts) {
    if (!ts) return false;
    const date = ts.toDate();
    const yesterday = new Date(Date.now() - 86400000);
    return date.getDate() === yesterday.getDate() && date.getMonth() === yesterday.getMonth() && date.getFullYear() === yesterday.getFullYear();
  }

  window.openChat = async (friendUid, friendUsername) => {
    currentChatPartner = { uid: friendUid, username: friendUsername };
    currentChatId = getChatId(currentUser.uid, friendUid);
    document.getElementById('tabs').classList.add('hidden');
    document.getElementById('friendsDiv').classList.add('hidden');
    document.getElementById('chatDiv').classList.remove('hidden');

    const friendDoc = await getDoc(doc(db, "users", friendUid));
    const friendData = friendDoc.data();
    const chatDoc = await getDoc(doc(db, "chats", currentChatId));
    let revealed = chatDoc.exists() && chatDoc.data().revealed;
    let totalMsgs = chatDoc.exists() ? chatDoc.data().totalMsgs || 0 : 0;
    let streak = chatDoc.exists() ? chatDoc.data().streak || 0 : 0;
    let lastChatDate = chatDoc.exists() ? chatDoc.data().lastChatDate : null;

    // Streak logic
    if (chatDoc.exists()) {
      if (!isToday(lastChatDate) && !isYesterday(lastChatDate)) {
        streak = 0; // Streak toot gaya
        await updateDoc(doc(db, "chats", currentChatId), { streak: 0 });
      }
    }

    document.getElementById('chatPic').src = friendData.picUrl || 'https://i.imgur.com/6VBx3io.png';
    document.getElementById('chatWith').innerHTML = revealed ? `@${friendData.displayName || friendUsername} ${streak > 0 ? `<span class="streak">🔥${streak}</span>` : ''}` : `<span class="anon">@hidden_${friendUid.slice(0,4)}</span>`;
    document.getElementById('chatStatus').innerText = friendData.showOnline && friendData.online ? 'online' : (friendData.showLastSeen ? formatLastSeen(friendData.lastSeen) : '');
    document.getElementById('msgCount').innerText = `${totalMsgs}/50`;
    document.getElementById('progressFill').style.width = `${Math.min((totalMsgs/50)*100, 100)}%`;

    if (currentChatUnsub) currentChatUnsub();
    const q = query(collection(db, "chats", currentChatId, "messages"), orderBy("time"));
    currentChatUnsub = onSnapshot(q, (snapshot) => {
      let html = '';
      const now = Timestamp.now();
      snapshot.forEach((doc) => {
        const msg = doc.data();
        if (now.seconds - msg.time.seconds > 86400) return; // 24h vanish
        if (msg.type === 'system') {
          html += `<div class="msg system">${msg.text}</div>`;
        } else {
          const name = revealed ? `@${msg.username}` : `<span class="anon">@hidden_${msg.uid.slice(0,4)}</span>`;
          let content = msg.text;
          if (msg.text.includes('http') && (msg.text.includes('jpg') || msg.text.includes('png') || msg.text.includes('gif') || msg.text.includes('jpeg') || msg.text.includes('imgur'))) {
            content = `<img src="${msg.text}" alt="image">`;
          }
          html += `<div class="msg"><b>${name}:</b> ${content}</div>`;
        }
      });
      document.getElementById('messages').innerHTML = html;
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });
  }

  window.closeChat = () => {
    if (currentChatUnsub) currentChatUnsub();
    currentChatId = null;
    currentChatPartner = null;
    document.getElementById('chatDiv').classList.add('hidden');
    document.getElementById('tabs').classList.remove('hidden');
    document.getElementById('friendsDiv').classList.remove('hidden');
  }

  window.sendMsg = async () => {
    const text = document.getElementById('msgInput').value.trim();
    if (!text || !currentChatId) return;
    document.getElementById('msgInput').value = '';
    const chatRef = doc(db, "chats", currentChatId);
    const chatDoc = await getDoc(chatRef);
    let totalMsgs = 0, revealed = false, streak = 0, lastChatDate = null;
    if (!chatDoc.exists()) {
      await setDoc(chatRef, { totalMsgs: 0, revealed: false, users: [currentUser.uid, currentChatPartner.uid], streak: 0, lastChatDate: null });
    } else {
      totalMsgs = chatDoc.data().totalMsgs || 0;
      revealed = chatDoc.data().revealed || false;
      streak = chatDoc.data().streak || 0;
      lastChatDate = chatDoc.data().lastChatDate;
    }

    // Streak update
    if (!isToday(lastChatDate)) {
      if (isYesterday(lastChatDate) || !lastChatDate) {
        streak++; // Streak badhao
      } else {
        streak = 1; // Naya streak
      }
      await updateDoc(chatRef, { streak: streak, lastChatDate: serverTimestamp() });
    }

    totalMsgs++;
    await updateDoc(chatRef, { totalMsgs: totalMsgs });
    await addDoc(collection(db, "chats", currentChatId, "messages"), {
      text: text,
      username: currentUserData.displayName || currentUserData.username,
      uid: currentUser.uid,
      time: serverTimestamp(),
      type: 'user'
    });
    if (totalMsgs === 50 && !revealed) {
      await updateDoc(chatRef, { revealed: true });
      await addDoc(collection(db, "chats", currentChatId, "messages"), {
        text: `🎉 ID Revealed! You are now chatting with @${currentUserData.displayName} & @${currentChatPartner.username}`,
        time: serverTimestamp(),
        type: 'system'
      });
      document.getElementById('chatWith').innerHTML = `@${currentChatPartner.username} ${streak > 0 ? `<span class="streak">🔥${streak}</span>` : ''}`;
    }
    document.getElementById('msgCount').innerText = `${totalMsgs}/50`;
    document.getElementById('progressFill').style.width = `${Math.min((totalMsgs/50)*100, 100)}%`;
  }

  function loadFriends() {
    onSnapshot(doc(db, "users", currentUser.uid), async (docSnap) => {
      if (docSnap.exists()) {
        currentUserData = docSnap.data();
        const friends = currentUserData.friends || [];
        if (friends.length === 0) {
          document.getElementById('friendsList').innerHTML = '<p style="text-align:center;color:#6b7280">No friends yet. Add some!</p>';
          return;
        }
        let html = '';
        for (const uid of friends) {
          const userDoc = await getDoc(doc(db, "users", uid));
          if (userDoc.exists()) {
            const user = userDoc.data();
            const chatId = getChatId(currentUser.uid, uid);
            const chatDoc = await getDoc(doc(db, "chats", chatId));
            const revealed = chatDoc.exists() && chatDoc.data().revealed;
            const streak = chatDoc.exists() ? chatDoc.data().streak || 0 : 0;
            const displayName = revealed ? (user.displayName || user.username) : `hidden_${uid.slice(0,4)}`;
            const statusDot = user.showOnline && user.online ? '<div class="onlineDot"></div>' : '<div class="offlineDot"></div>';
            html += `<div class="userRow" onclick="openChat('${uid}','${user.username}')">
              <div class="userInfo">
                <img class="profilePic" src="${user.picUrl || 'https://i.imgur.com/6VBx3io.png'}">
                <div>
                  <b>${revealed ? '@' : ''}${displayName} ${streak > 0 ? `<span class="streak">🔥${streak}</span>` : ''}</b>
                  <div class="lastSeen">${user.showOnline && user.online ? 'online' : (user.showLastSeen ? formatLastSeen(user.lastSeen) : '')}</div>
                </div>
              ${statusDot}
            </div>`;
          }
        }
        document.getElementById('friendsList').innerHTML = html;
      }
    });
  }

  window.searchUser = async () => {
    const search = document.getElementById('searchUser').value.trim().toLowerCase().replace('@', '');
    if (!search) return;
    const userList = document.getElementById('userList');
    userList.innerHTML = '<p style="text-align:center;color:#6b7280">Searching...</p>';
    let q = query(collection(db, "users"), where("username", "==", search));
    let snap = await getDocs(q);
    if (snap.empty) {
      q = query(collection(db, "users"), where("email", "==", search));
      snap = await getDocs(q);
    }
    if (snap.empty) {
      userList.innerHTML = '<p style="text-align:center;color:#f87171">User not found</p>';
      return;
    }
    let html = '';
    snap.forEach((doc) => {
      const user = doc.data();
      if (user.uid !== currentUser.uid) {
        const isFriend = currentUserData.friends?.includes(user.uid);
        const reqSent = user.requests?.includes(currentUser.uid);
        let btn = '';
        if (isFriend) {
          btn = `<span style="color:#16a34a">✓ Friends</span>`;
        } else if (reqSent) {
          btn = `<button class="smallBtn greyBtn" disabled>Request Sent</button>`;
        } else {
          btn = `<button class="smallBtn" onclick="sendRequest('${user.uid}')">Add Friend</button>`;
        }
        html += `<div class="userRow"><div class="userInfo"><img class="profilePic" src="${user.picUrl || 'https://i.imgur.com/6VBx3io.png'}"><b>@${user.displayName || user.username}</b></div> ${btn}</div>`;
      }
    });
    userList.innerHTML = html || '<p style="text-align:center;color:#f87171">Cannot add yourself</p>';
  }

  window.sendRequest = async (targetUid) => {
    await updateDoc(doc(db, "users", targetUid), {
      requests: arrayUnion(currentUser.uid)
    });
    searchUser();
    alert('Friend request sent! 🔔');
  }

  function loadRequests() {
    onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
      if (docSnap.exists()) {
        currentUserData = docSnap.data();
        const reqs = currentUserData.requests || [];
        const notif = document.getElementById('reqNotif');
        if (reqs.length > 0) {
          notif.innerText = reqs.length;
          notif.classList.remove('hidden');
        } else {
          notif.classList.add('hidden');
        }
        if (reqs.length === 0) {
          document.getElementById('requestList').innerHTML = '<p style="text-align:center;color:#6b7280">No friend requests</p>';
          return;
        }
        let html = '';
        reqs.forEach(async (uid) => {
          const userDoc = await getDoc(doc(db, "users", uid));
          if (userDoc.exists()) {
            const user = userDoc.data();
            html += `<div class="userRow">
              <div class="userInfo"><img class="profilePic" src="${user.picUrl || 'https://i.imgur.com/6VBx3io.png'}"><b>@${user.displayName || user.username}</b></div>
              <div>
                <button class="smallBtn greenBtn" onclick="acceptRequest('${uid}')">Accept</button>
                <button class="smallBtn redBtn" onclick="ignoreRequest('${uid}')">Ignore</button>
              </div>
            </div>`;
            document.getElementById('requestList').innerHTML = html;
          }
        });
      }
    });
  }

  window.acceptRequest = async (fromUid) => {
    await updateDoc(doc(db, "users", currentUser.uid), {
      friends: arrayUnion(fromUid),
      requests: arrayRemove(fromUid)
    });
    await updateDoc(doc(db, "users", fromUid), {
      friends: arrayUnion(currentUser.uid)
    });
  }

  window.ignoreRequest = async (fromUid) => {
    await updateDoc(doc(db, "users", currentUser.uid), {
      requests: arrayRemove(fromUid)
    });
  }

  window.toggleOnline = () => {
    const t = document.getElementById('onlineToggle');
    t.classList.toggle('on');
  }
  window.toggleLastSeen = () => {
    const t = document.getElementById('lastSeenToggle');
    t.classList.toggle('on');
  }

  window.saveProfile = async () => {
    const displayName = document.getElementById('displayName').value.trim() || currentUserData.username;
    const picUrl = document.getElementById('picUrl').value.trim() || 'https://i.imgur.com/6VBx3io.png';
    const showOnline = document.getElementById('onlineToggle').classList.contains('on');
    const showLastSeen = document.getElementById('lastSeenToggle').classList.contains('on');
    await updateDoc(doc(db, "users", currentUser.uid), {
      displayName: displayName,
      picUrl: picUrl,
      showOnline: showOnline,
      showLastSeen: showLastSeen
    });
    document.getElementById('myProfilePic').src = picUrl;
    alert('Profile Updated! ✅');
  }

  setInterval(async () => {
    if (currentUser) {
      await updateDoc(doc(db, "users", currentUser.uid), { lastSeen: serverTimestamp() });
    }
  }, 30000);
</script>

</body>
</html>
